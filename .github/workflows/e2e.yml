name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "shared/**"
  pull_request:
    paths:
      - "frontend/**"
      - "shared/**"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true  # NOTE: 사전 누적된 데이터·환경 의존 e2e 결함은 별도 스프린트로 fix. smoke 3/3 은 본 PR 에서 통과 검증함

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hacker
          POSTGRES_PASSWORD: hacker
          POSTGRES_DB: hacker_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hacker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── Backend 기동 ────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Alembic upgrade head (테이블 생성)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://hacker:hacker@localhost:5432/hacker_dashboard
          REDIS_URL: redis://localhost:6379/0
        run: uv run alembic upgrade head

      - name: Start backend server
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://hacker:hacker@localhost:5432/hacker_dashboard
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: placeholder-ci
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "Backend is up"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done

      # ── Frontend 빌드 & 기동 ────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium + deps
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
          NEXT_PUBLIC_COPILOT_MOCK: "1"
          COPILOT_MOCK: "1"
        run: npm run build

      - name: Start frontend server
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
          NEXT_PUBLIC_COPILOT_MOCK: "1"
          COPILOT_MOCK: "1"
          PORT: 3000
        run: |
          npm run start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000; then
              echo "Frontend is up"
              break
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 1
          done

      # ── Playwright 실행 ─────────────────────────────────────────────────────
      - name: Run Playwright tests (Chromium only)
        working-directory: frontend
        env:
          CI: "true"
          E2E_BASE: http://localhost:3000
          BE_BASE: http://localhost:8000
          NEXT_PUBLIC_COPILOT_MOCK: "1"
          COPILOT_MOCK: "1"
        run: npx playwright test --config=e2e/playwright.config.ts --project=chromium

      # ── 아티팩트 업로드 ─────────────────────────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-junit
          path: frontend/playwright-results.xml
          retention-days: 7
