name: Production Smoke Test

on:
  workflow_dispatch:
    inputs:
      prod_url:
        description: "FE 프로덕션 URL"
        required: false
        default: "https://hacker-dashboard.vercel.app"
      be_url:
        description: "BE 프로덕션 URL"
        required: false
        default: "https://hacker-dashboard-api.fly.dev"
  schedule:
    # 매일 09:00 KST (= UTC 00:00)
    - cron: "0 0 * * *"

concurrency:
  group: production-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Production Smoke (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run production smoke tests
        working-directory: frontend
        env:
          CI: "true"
          PROD_URL: ${{ github.event.inputs.prod_url || 'https://hacker-dashboard.vercel.app' }}
          BE_URL: ${{ github.event.inputs.be_url || 'https://hacker-dashboard-api.fly.dev' }}
        run: |
          npx playwright test e2e/production.spec.ts --project=chromium

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-smoke-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 14
