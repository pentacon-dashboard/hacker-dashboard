networks:
  hacker-net:
    driver: bridge

volumes:
  postgres-data:

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hacker
      POSTGRES_PASSWORD: hacker
      POSTGRES_DB: hacker_dashboard
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hacker-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hacker -d hacker_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - hacker-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./.env
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://hacker:hacker@postgres:5432/hacker_dashboard
      REDIS_URL: redis://redis:6379/0
      COPILOT_NEWS_MODE: live
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hacker-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACKEND_API_BASE: http://backend:8000
      NEXT_PUBLIC_API_BASE: http://127.0.0.1:8000
      NEXT_PUBLIC_WS_BASE: ws://127.0.0.1:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hacker-net
    restart: unless-stopped
